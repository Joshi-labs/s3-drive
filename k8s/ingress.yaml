apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: s3-drive
  namespace: apps-prod
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: s3-drive.vpjoshi.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: s3-drive
                port:
                  number: 80